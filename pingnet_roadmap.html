<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pingnet Roadmap</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #07070f;
  --bg1:      #0d0d1a;
  --bg2:      #111120;
  --bg3:      #1a1a2e;
  --border:   #1e1e35;
  --border2:  #2a2a45;
  --text:     #e2e8f0;
  --text2:    #8892a4;
  --text3:    #4b5563;
  --teal:     #00c8a8;
  --teal-dim: #00c8a820;
  --purple:   #6366f1;
  --amber:    #f59e0b;
  --red:      #ef4444;
  --green:    #22c55e;
  --blue:     #3b82f6;
  --radius:   10px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 0;
}

/* ── Layout ── */
.shell {
  max-width: 900px;
  margin: 0 auto;
  padding: 2rem 1.5rem 4rem;
}

/* ── Header ── */
.header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 2rem;
  gap: 1rem;
  flex-wrap: wrap;
}
.header-left h1 {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 4px;
}
.header-left p {
  font-size: 13px;
  color: var(--text2);
}
.header-actions {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
}
.btn {
  font-size: 12px;
  font-weight: 500;
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: var(--bg2);
  color: var(--text2);
  cursor: pointer;
  transition: all 0.15s;
}
.btn:hover { color: var(--text); border-color: var(--border2); background: var(--bg3); }
.btn-teal { border-color: var(--teal); color: var(--teal); background: var(--teal-dim); }
.btn-teal:hover { background: #00c8a830; color: var(--teal); }

/* ── Progress ── */
.progress-wrap {
  margin-bottom: 1.5rem;
}
.progress-meta {
  display: flex;
  gap: 20px;
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 8px;
}
.progress-meta strong { color: var(--text); font-weight: 600; }
.bar {
  height: 4px;
  background: var(--bg3);
  border-radius: 4px;
  overflow: hidden;
}
.bar-fill {
  height: 100%;
  background: var(--teal);
  border-radius: 4px;
  transition: width 0.4s cubic-bezier(.4,0,.2,1);
}

/* ── Section ── */
.section { margin-bottom: 2.5rem; }
.section-label {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--text3);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.section-label::after {
  content: "";
  flex: 1;
  height: 1px;
  background: var(--border);
}

/* ── Grid ── */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
  gap: 10px;
}

/* ── Card ── */
.card {
  background: var(--bg1);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  position: relative;
}
.card:hover { border-color: var(--border2); background: var(--bg2); }
.card.expanded { border-color: var(--border2); background: var(--bg2); }
.card.is-shipped {
  opacity: 0.55;
}
.card.is-shipped:hover { opacity: 0.8; }

.card-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 8px;
  margin-bottom: 8px;
}
.card-icon {
  font-size: 16px;
  line-height: 1;
  flex-shrink: 0;
  margin-top: 1px;
}
.card-check {
  width: 17px; height: 17px;
  border-radius: 50%;
  border: 1px solid var(--border2);
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  font-size: 10px;
  color: transparent;
  transition: all 0.15s;
}
.card-check.done {
  background: #00c8a820;
  border-color: var(--teal);
  color: var(--teal);
}
.card-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text);
  line-height: 1.35;
  margin-bottom: 5px;
  display: flex;
  align-items: flex-start;
  gap: 6px;
  flex-wrap: wrap;
}
.card-desc {
  font-size: 11.5px;
  color: var(--text2);
  line-height: 1.55;
}
.card-meta {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-top: 8px;
  flex-wrap: wrap;
}

/* ── Badges ── */
.badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 2px 7px;
  border-radius: 20px;
  line-height: 1.6;
  letter-spacing: 0.02em;
}
.badge-core  { background: #0c447c22; color: #60a5fa; border: 1px solid #1e40af44; }
.badge-sec   { background: #7f1d1d22; color: #f87171; border: 1px solid #b91c1c44; }
.badge-int   { background: #14532d22; color: #4ade80; border: 1px solid #15803d44; }
.badge-ai    { background: #3730a322; color: #a5b4fc; border: 1px solid #4338ca44; }
.badge-ux    { background: #78350f22; color: #fbbf24; border: 1px solid #b4530044; }

.ver-badge {
  display: inline-block;
  font-size: 10px;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 4px;
  background: var(--teal-dim);
  color: var(--teal);
  border: 1px solid #00c8a830;
  font-family: "SF Mono", "Fira Code", monospace;
  line-height: 1.6;
}

/* ── Note drawer ── */
.note-drawer {
  display: none;
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px solid var(--border);
}
.note-drawer.open { display: block; }
.note-drawer textarea {
  width: 100%;
  min-height: 72px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text2);
  font-size: 11.5px;
  line-height: 1.55;
  padding: 8px 10px;
  resize: vertical;
  font-family: inherit;
  transition: border-color 0.15s;
  outline: none;
}
.note-drawer textarea:focus { border-color: var(--border2); color: var(--text); }
.note-drawer textarea::placeholder { color: var(--text3); }
.note-hint {
  font-size: 10px;
  color: var(--text3);
  margin-top: 5px;
}
.has-note::after {
  content: "";
  position: absolute;
  top: 10px; right: 10px;
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--teal);
  opacity: 0.6;
}

/* ── Empty note indicator ── */
.note-icon {
  font-size: 10px;
  color: var(--text3);
  margin-left: auto;
  opacity: 0;
  transition: opacity 0.15s;
}
.card:hover .note-icon { opacity: 1; }

/* ── Import dialog ── */
#import-overlay {
  display: none;
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 100;
  align-items: center;
  justify-content: center;
}
#import-overlay.open { display: flex; }
.import-box {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 12px;
  padding: 20px;
  width: 400px;
  max-width: 90vw;
}
.import-box h3 { font-size: 14px; font-weight: 600; margin-bottom: 12px; }
.import-box textarea {
  width: 100%; height: 160px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text2);
  font-size: 11px;
  padding: 8px;
  resize: none;
  font-family: "SF Mono", monospace;
  outline: none;
}
.import-actions { display: flex; gap: 8px; margin-top: 12px; justify-content: flex-end; }
</style>
</head>
<body>
<div class="shell">

  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <h1>Pingnet Roadmap</h1>
      <p>Click any card to add notes. State is saved locally.</p>
    </div>
    <div class="header-actions">
      <button class="btn" onclick="openImport()">↑ Import</button>
      <button class="btn btn-teal" onclick="exportDB()">↓ Export JSON</button>
    </div>
  </div>

  <!-- Progress -->

    <div class="progress-meta">

  </div>

  <!-- ── GIT & CODE ── -->
  <div class="section">
    <div class="section-label">Git &amp; Code</div>
    <div class="grid" id="grid-git"></div>
  </div>

  <!-- ── AI & AUTOMATION ── -->
  <div class="section">
    <div class="section-label">AI &amp; Automation</div>
    <div class="grid" id="grid-ai"></div>
  </div>

  <!-- ── FILE & CLOUD ── -->
  <div class="section">
    <div class="section-label">File &amp; Cloud</div>
    <div class="grid" id="grid-cloud"></div>
  </div>

  <!-- ── INFRA & DEVOPS ── -->
  <div class="section">
    <div class="section-label">Infra &amp; DevOps</div>
    <div class="grid" id="grid-infra"></div>
  </div>

  <!-- ── SECURITY ── -->
  <div class="section">
    <div class="section-label">Security</div>
    <div class="grid" id="grid-sec"></div>
  </div>

</div>

<!-- Import overlay -->
<div id="import-overlay">
  <div class="import-box">
    <h3>Import JSON backup</h3>
    <textarea id="import-ta" placeholder='Paste exported JSON here…'></textarea>
    <div class="import-actions">
      <button class="btn" onclick="closeImport()">Cancel</button>
      <button class="btn btn-teal" onclick="doImport()">Import</button>
    </div>
  </div>
</div>

const BADGE_LABELS = { core: "Core", sec: "Security", int: "Integration", ai: "AI", ux: "UX" };
const GRID_IDS = { shipped: "grid-shipped", git: "grid-git", ai: "grid-ai", cloud: "grid-cloud", infra: "grid-infra", sec: "grid-sec" };

// ── DB (localStorage) ─────────────────────────────────────────────────────────
const DB_KEY = "pingnet_roadmap_db_v1";

function loadDB() {
  try { return JSON.parse(localStorage.getItem(DB_KEY) || "{}"); }
  catch { return {}; }
}

function saveDB(db) {
  localStorage.setItem(DB_KEY, JSON.stringify(db, null, 2));
}

function getEntry(db, id) {
  return db[id] || { notes: "", checked: false };
}

// ── Render ────────────────────────────────────────────────────────────────────

function badgeHTML(b) {
  return `<span class="badge badge-${b}">${BADGE_LABELS[b] || b}</span>`;
}

function buildCard(item, db) {
  const entry = getEntry(db, item.id);
  const isShipped = !!item.shipped;
  const isDone = isShipped || entry.checked;
  const hasNote = entry.notes && entry.notes.trim().length > 0;

  const verTag = item.version
    ? `<span class="ver-badge">${item.version}</span>`
    : "";

  const card = document.createElement("div");
  card.className = "card" + (isShipped ? " is-shipped" : "") + (hasNote ? " has-note" : "");
  card.dataset.id = item.id;

  card.innerHTML = `
    <div class="card-header">
      <span class="card-icon">${item.icon}</span>
      <div class="card-check ${isDone ? "done" : ""}" data-check>✓</div>
    </div>
    <div class="card-title">${item.title}</div>
    <div class="card-desc">${item.desc}</div>
    <div class="card-meta">
      ${badgeHTML(item.badge)}
      ${verTag}
    </div>
    <div class="note-drawer" data-drawer>
      <textarea placeholder="Add notes, ideas, links…" data-notes>${entry.notes || ""}</textarea>
      <div class="note-hint">Auto-saved · Shift+Enter for new line</div>
    </div>
  `;

  // Toggle expand on card click (not on check click)
  card.addEventListener("click", (e) => {
    if (e.target.closest("[data-check]")) {
      e.stopPropagation();
      if (isShipped) return; // shipped items can't be unchecked
      toggleCheck(item.id, card);
      return;
    }
    const drawer = card.querySelector("[data-drawer]");
    const isOpen = drawer.classList.toggle("open");
    card.classList.toggle("expanded", isOpen);
    if (isOpen) card.querySelector("textarea").focus();
  });

  // Auto-save notes
  const ta = card.querySelector("textarea");
  ta.addEventListener("input", () => {
    const db2 = loadDB();
    const entry2 = getEntry(db2, item.id);
    entry2.notes = ta.value;
    db2[item.id] = entry2;
    saveDB(db2);
    card.classList.toggle("has-note", ta.value.trim().length > 0);
  });

  // Stop textarea clicks from toggling the card
  ta.addEventListener("click", e => e.stopPropagation());

  return card;
}

function toggleCheck(id, card) {
  const db = loadDB();
  const entry = getEntry(db, id);
  entry.checked = !entry.checked;
  db[id] = entry;
  saveDB(db);
  const check = card.querySelector("[data-check]");
  check.classList.toggle("done", entry.checked);
  updateStats();
}

function renderAll() {
  const db = loadDB();

  // Pre-mark shipped items as checked in DB
  ITEMS.forEach(item => {
    if (item.shipped) {
      const e = getEntry(db, item.id);
      if (!e.checked) { e.checked = true; db[item.id] = e; }
    }
  });
  saveDB(db);

  // Clear grids
  Object.values(GRID_IDS).forEach(gid => {
    const el = document.getElementById(gid);
    if (el) el.innerHTML = "";
  });

  ITEMS.forEach(item => {
    const grid = document.getElementById(GRID_IDS[item.grid]);
    if (!grid) return;
    grid.appendChild(buildCard(item, db));
  });

  updateStats();
}

function updateStats() {
  const db = loadDB();
  const total = ITEMS.length;
  const done = ITEMS.filter(i => {
    const e = getEntry(db, i.id);
    return i.shipped || e.checked;
  }).length;
  const pct = Math.round(done / total * 100);

  document.getElementById("done-n").textContent = done;
  document.getElementById("pct-n").textContent = pct + "%";
  document.getElementById("left-n").textContent = total - done;
  document.getElementById("bar-fill").style.width = pct + "%";
}

// ── Export / Import ───────────────────────────────────────────────────────────

function exportDB() {
  const db = loadDB();
  const blob = new Blob([JSON.stringify(db, null, 2)], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `pingnet_roadmap_db_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  setTimeout(() => URL.revokeObjectURL(url), 10_000);
}

function openImport() {
  document.getElementById("import-overlay").classList.add("open");
  document.getElementById("import-ta").value = "";
  document.getElementById("import-ta").focus();
}

function closeImport() {
  document.getElementById("import-overlay").classList.remove("open");
}

function doImport() {
  try {
    const data = JSON.parse(document.getElementById("import-ta").value);
    saveDB(data);
    closeImport();
    renderAll();
  } catch {
    alert("Invalid JSON — paste the full exported file.");
  }
}

document.getElementById("import-overlay").addEventListener("click", e => {
  if (e.target === e.currentTarget) closeImport();
});

// ── Init ──────────────────────────────────────────────────────────────────────
renderAll();
</script>
</body>
</html>
